<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Границы CSS</title>
<style>
  #solid {
    width: 300px;
    height: 100px;
    border: 1px solid black;
    margin-bottom: 20px;
  }

  #dotted {
    width: 300px;
    height: 100px;
    border: 1px dotted red;
    margin-bottom: 20px;
  }

  #dashed {
    width: 300px;
    height: 100px;
    border: 1px dashed orange;
    margin-bottom: 20px;
  }

  #ridge {
    width: 300px;
    height: 100px;
    border: 3px ridge black;
    margin-bottom: 20px;
  }

  #double {
    width: 300px;
    height: 100px;
    border: 5px double blue;
    margin-bottom: 20px;
  }

  #short-border {
    width: 300px;
    height: 100px;
    border: 2px solid red;
    margin-bottom: 20px;
  }

  #sides {
    width: 300px;
    height: 100px;
    border-left: 3px solid green;
    border-right: 3px solid purple;
    margin-bottom: 20px;
  }
</style>
</head>
<body>
  <div id="solid"></div>
  <div id="dotted"></div>
  <div id="dashed"></div>
  <div id="ridge"></div>
  <div id="double"></div>
  <div id="short-border"></div>
  <div id="sides"></div>
</body>
</html>
